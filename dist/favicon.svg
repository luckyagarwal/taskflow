<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="TaskFlow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- app-icon squircle -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#sheen)"/>

  <!-- T lettermark -->
  <g fill="#ffffff">
    <rect x="120" y="150" width="272" height="70" rx="30"/>
    <rect x="221" y="150" width="70" height="216" rx="30"/>
  </g>
</svg>
